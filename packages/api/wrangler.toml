name = "history-gauntlet-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "history-gauntlet-db"
database_id = "88eb1081-2b0e-4337-a27d-4abf1f16035b"
migrations_dir = "src/db/migrations"

[[r2_buckets]]
binding = "GAME_BUCKET"
bucket_name = "history-gauntlet-games"

# --- Development environment overrides ---
[env.dev]
name = "history-gauntlet-api-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "history-gauntlet-db-dev"
database_id = "placeholder-replace-with-dev-id"
migrations_dir = "src/db/migrations"

[[env.dev.r2_buckets]]
binding = "GAME_BUCKET"
bucket_name = "history-gauntlet-games-dev"

# --- Staging environment overrides ---
[env.staging]
name = "history-gauntlet-api-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "history-gauntlet-db-staging"
database_id = "placeholder-replace-with-staging-id"
migrations_dir = "src/db/migrations"

[[env.staging.r2_buckets]]
binding = "GAME_BUCKET"
bucket_name = "history-gauntlet-games-staging"
